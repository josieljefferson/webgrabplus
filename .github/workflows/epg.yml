# webgrabplus/
# .github/workflows/epg.yml
# config/WebGrab++.config.xml
# config/siteini.pack/
# output/
# README.md

name: Atualizar EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y \
            mono-complete \
            unzip \
            wget \
            curl \
            gzip

      - name: Baixar WebGrab+Plus
        run: |
          wget https://github.com/SilentButeo2/webgrabplus-package/releases/download/v5.1/WebGrabPlus_V5.1_install.tar.gz
          
          mkdir wg
          
          tar -xzf WebGrabPlus_V5.1_install.tar.gz -C wg

      - name: Baixar SiteIni Pack
        run: |
          mkdir -p config/siteini.pack

          wget -O siteini.pack.zip \
            https://webgrabplus.com/sites/default/files/download/SiteIniPack_current.zip

          unzip -o siteini.pack.zip -d config/siteini.pack

      - name: Executar WebGrab+Plus
        run: |
          mono wg/bin/WebGrab+Plus.exe \
            config/WebGrab++.config.xml

      - name: Compactar EPG
        run: |
          gzip -f guide.xml

          mkdir -p output

          mv guide.xml.gz output/

      - name: Commit automático
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add output/guide.xml.gz

          git commit -m "Atualização automática EPG" || echo "Sem alterações"

          git push