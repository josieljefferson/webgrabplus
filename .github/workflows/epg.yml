# webgrabplus/
# .github/workflows/epg.yml
# config/WebGrab++.config.xml
# config/siteini.pack/
# output/
# README.md
# config/siteini.pack/Brazil/vivo.com.br.channels.xml
# config/siteini.pack/Portugal/vodafone.pt.channels.xml

name: Atualizar EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y gzip git

      - name: Baixar SiteIni Pack
        run: |
          mkdir -p config/siteini.pack

          git clone \
          https://github.com/SilentButeo2/webgrabplus-siteinipack.git \
          config/siteini.pack

      - name: Criar pasta output
        run: mkdir -p output

      - name: Executar WebGrab+Plus via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/config:/config \
            -v ${{ github.workspace }}:/data \
            ghcr.io/linuxserver/webgrabplus:latest

      - name: Compactar XML
        run: |
          gzip -f guide.xml

          mv guide.xml.gz output/guide.xml.gz

      - name: Commit automático
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add output/guide.xml.gz

          git commit -m "EPG atualizado automaticamente" || echo "Sem alterações"

          git push